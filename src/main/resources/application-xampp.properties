# Konfigurasi untuk pengguna XAMPP
# Jalankan dengan: mvn spring-boot:run -Dspring-boot.run.profiles=xampp

spring.datasource.url=jdbc:mysql://localhost:3306/db_budgeting?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Jakarta&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

server.port=8080

app.username=admin
app.password=admin123
