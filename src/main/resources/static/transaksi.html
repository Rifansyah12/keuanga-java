<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi — Catatan Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div id="sidebarMount"></div>
    <div class="main-content flex-grow-1">

        <div class="topbar">
            <div>
                <h4>Transaksi</h4>
                <p>Kelola semua pemasukan dan pengeluaran</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <i class="bi bi-plus-lg me-1"></i> Tambah Transaksi
            </button>
        </div>

        <!-- Filter -->
        <div class="filter-bar">
            <div>
                <label class="form-label">Bulan</label>
                <select id="filterBulan" class="form-select form-select-sm" style="width:130px"></select>
            </div>
            <div>
                <label class="form-label">Tahun</label>
                <select id="filterTahun" class="form-select form-select-sm" style="width:90px"></select>
            </div>
            <button class="btn btn-primary btn-sm" onclick="loadFilter()">
                <i class="bi bi-funnel me-1"></i>Filter
            </button>
            <button class="btn btn-secondary btn-sm" onclick="loadAll()">Semua</button>

            <!-- Summary pills -->
            <div class="ms-auto d-flex gap-2">
                <span style="background:#dcfce7;color:#15803d;padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:600">
                    <i class="bi bi-arrow-down-circle me-1"></i><span id="pillPemasukan">Rp 0</span>
                </span>
                <span style="background:#fee2e2;color:#dc2626;padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:600">
                    <i class="bi bi-arrow-up-circle me-1"></i><span id="pillPengeluaran">Rp 0</span>
                </span>
            </div>
        </div>

        <!-- Table -->
        <div class="card table-card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Kategori</th>
                        <th>Keterangan</th>
                        <th class="text-end">Jumlah</th>
                        <th class="text-center" style="width:100px">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelBody">
                    <tr><td colspan="5"><div class="empty-state"><i class="bi bi-clock"></i><p>Memuat data...</p></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalTransaksi" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Tambah Transaksi</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="transaksiId">
                <div class="mb-3">
                    <label class="form-label">Tanggal</label>
                    <input type="date" class="form-control" id="inputTanggal" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Kategori</label>
                    <select class="form-select" id="inputKategori" required>
                        <option value="">— Pilih Kategori —</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Jumlah (Rp)</label>
                    <input type="number" class="form-control" id="inputJumlah" placeholder="50000" min="1" required>
                </div>
                <div class="mb-1">
                    <label class="form-label">Keterangan <span style="color:#94a3b8;font-weight:400">(opsional)</span></label>
                    <input type="text" class="form-control" id="inputKeterangan" placeholder="Contoh: Makan siang di warteg">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button class="btn btn-primary" onclick="simpan()">Simpan</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/app.js"></script>
<script>
    checkLogin();
    renderSidebar('transaksi');

    const modal  = new bootstrap.Modal(document.getElementById('modalTransaksi'));
    const now    = new Date();
    let allKat   = [];
    let currData = [];

    fillBulanSelect(document.getElementById('filterBulan'), now.getMonth() + 1);
    fillTahunSelect(document.getElementById('filterTahun'), now.getFullYear());

    async function init() {
        allKat = await apiGet('/api/kategori');
        const sel = document.getElementById('inputKategori');
        sel.innerHTML = '<option value="">— Pilih Kategori —</option>';
        allKat.forEach(k => sel.add(new Option(`${k.nama}  (${k.jenis})`, k.id)));
        await loadAll();
    }

    async function loadAll() {
        render(await apiGet('/api/transaksi'));
    }

    async function loadFilter() {
        const b = document.getElementById('filterBulan').value;
        const t = document.getElementById('filterTahun').value;
        render(await apiGet(`/api/transaksi/bulan/${b}/tahun/${t}`));
    }

    function render(data) {
        currData = data;
        // Update pills
        let totalPemasukan = 0, totalPengeluaran = 0;
        data.forEach(t => {
            if (t.kategori.jenis === 'PEMASUKAN') totalPemasukan += t.jumlah;
            else totalPengeluaran += t.jumlah;
        });
        document.getElementById('pillPemasukan').textContent   = formatRupiah(totalPemasukan);
        document.getElementById('pillPengeluaran').textContent = formatRupiah(totalPengeluaran);

        const tbody = document.getElementById('tabelBody');
        if (!data.length) {
            tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
                <i class="bi bi-receipt"></i><p>Belum ada transaksi</p></div></td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(t => {
            const isPemasukan = t.kategori.jenis === 'PEMASUKAN';
            return `<tr>
                <td style="color:#64748b;font-size:0.82rem">${t.tanggal}</td>
                <td>
                    <span class="${isPemasukan ? 'badge-income' : 'badge-expense'}">
                        ${t.kategori.nama}
                    </span>
                </td>
                <td style="color:#475569">${t.keterangan || '<span style="color:#cbd5e1">—</span>'}</td>
                <td class="text-end fw-600" style="color:${isPemasukan ? '#16a34a' : '#dc2626'};font-weight:600">
                    ${isPemasukan ? '+' : '-'} ${formatRupiah(t.jumlah)}
                </td>
                <td class="text-center">
                    <button class="btn btn-outline-primary btn-sm me-1" onclick='edit(${JSON.stringify(t)})'>
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-outline-danger btn-sm" onclick="hapus(${t.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    function openModal(clear = true) {
        if (clear) {
            document.getElementById('transaksiId').value = '';
            document.getElementById('modalTitle').textContent = 'Tambah Transaksi';
            document.getElementById('inputTanggal').value = new Date().toISOString().split('T')[0];
            document.getElementById('inputKategori').value = '';
            document.getElementById('inputJumlah').value = '';
            document.getElementById('inputKeterangan').value = '';
        }
        modal.show();
    }

    function edit(t) {
        document.getElementById('transaksiId').value = t.id;
        document.getElementById('modalTitle').textContent = 'Edit Transaksi';
        document.getElementById('inputTanggal').value = t.tanggal;
        document.getElementById('inputKategori').value = t.kategori.id;
        document.getElementById('inputJumlah').value = t.jumlah;
        document.getElementById('inputKeterangan').value = t.keterangan || '';
        openModal(false);
    }

    async function simpan() {
        const id = document.getElementById('transaksiId').value;
        const katId = parseInt(document.getElementById('inputKategori').value);
        if (!katId) { showToast('Pilih kategori terlebih dahulu', 'warning'); return; }
        const payload = {
            tanggal: document.getElementById('inputTanggal').value,
            jumlah: parseFloat(document.getElementById('inputJumlah').value),
            keterangan: document.getElementById('inputKeterangan').value,
            kategori: { id: katId }
        };
        try {
            if (id) await apiPut(`/api/transaksi/${id}`, payload);
            else await apiPost('/api/transaksi', payload);
            modal.hide();
            showToast('Transaksi berhasil disimpan');
            loadAll();
        } catch { showToast('Gagal menyimpan transaksi', 'danger'); }
    }

    async function hapus(id) {
        if (!confirm('Hapus transaksi ini?')) return;
        try {
            await apiDelete(`/api/transaksi/${id}`);
            showToast('Transaksi dihapus');
            loadAll();
        } catch { showToast('Gagal menghapus', 'danger'); }
    }

    init();
</script>
</body>
</html>
