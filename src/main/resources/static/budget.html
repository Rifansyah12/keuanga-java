<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget - Catatan Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; }
        .navbar { background: #4f46e5 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <a href="/index.html" class="navbar-brand fw-bold"><i class="bi bi-wallet2 me-2"></i>Catatan Keuangan</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/index.html" class="text-white text-decoration-none small">Dashboard</a>
            <a href="/transaksi.html" class="text-white text-decoration-none small">Transaksi</a>
            <a href="/kategori.html" class="text-white text-decoration-none small">Kategori</a>
            <span class="text-white small"><i class="bi bi-person-circle me-1"></i><span id="usernameDisplay"></span></span>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">Keluar</button>
        </div>
    </nav>

    <div class="container p-4" style="max-width: 700px">
        <h5 class="fw-bold mb-3">Atur Budget Bulanan</h5>

        <!-- Form Set Budget -->
        <div class="card shadow-sm p-4 mb-4">
            <h6 class="fw-semibold mb-3">Set Budget Bulan Ini</h6>
            <div class="row g-2 align-items-end">
                <div class="col">
                    <label class="form-label small">Bulan</label>
                    <select class="form-select" id="inputBulan"></select>
                </div>
                <div class="col">
                    <label class="form-label small">Tahun</label>
                    <select class="form-select" id="inputTahun"></select>
                </div>
                <div class="col-12 col-md-5">
                    <label class="form-label small">Jumlah Budget (Rp)</label>
                    <input type="number" class="form-control" id="inputJumlah" placeholder="3000000" min="0">
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary w-100" onclick="simpanBudget()">
                        <i class="bi bi-save me-1"></i> Simpan
                    </button>
                </div>
            </div>
        </div>

        <!-- Daftar Budget -->
        <div class="card shadow-sm">
            <div class="card-header bg-white fw-semibold">Riwayat Budget</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Bulan</th>
                            <th>Tahun</th>
                            <th class="text-end">Budget</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelBody">
                        <tr><td colspan="4" class="text-center text-muted py-4">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/app.js"></script>
    <script>
        checkLogin();
        const now = new Date();

        // Isi dropdown
        const selBulan = document.getElementById('inputBulan');
        const selTahun = document.getElementById('inputTahun');

        BULAN_NAMA.slice(1).forEach((n, i) => {
            const o = new Option(n, i + 1);
            if (i + 1 === now.getMonth() + 1) o.selected = true;
            selBulan.add(o);
        });
        for (let y = now.getFullYear(); y >= now.getFullYear() - 4; y--) {
            const o = new Option(y, y);
            if (y === now.getFullYear()) o.selected = true;
            selTahun.add(o);
        }

        async function load() {
            const data = await apiGet('/api/budget');
            const tbody = document.getElementById('tabelBody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Belum ada budget tersimpan</td></tr>';
                return;
            }
            // Urutkan terbaru dulu
            data.sort((a, b) => b.tahun - a.tahun || b.bulan - a.bulan);
            tbody.innerHTML = data.map(b => `
                <tr>
                    <td>${BULAN_NAMA[b.bulan]}</td>
                    <td>${b.tahun}</td>
                    <td class="text-end fw-semibold">${formatRupiah(b.jumlahBudget)}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-danger" onclick="hapus(${b.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function simpanBudget() {
            const payload = {
                bulan: parseInt(selBulan.value),
                tahun: parseInt(selTahun.value),
                jumlahBudget: parseFloat(document.getElementById('inputJumlah').value)
            };
            if (!payload.jumlahBudget || payload.jumlahBudget <= 0) {
                showToast('Masukkan jumlah budget yang valid', 'warning');
                return;
            }
            try {
                await apiPost('/api/budget', payload);
                showToast('Budget disimpan');
                document.getElementById('inputJumlah').value = '';
                load();
            } catch { showToast('Gagal menyimpan budget', 'danger'); }
        }

        async function hapus(id) {
            if (!confirm('Hapus budget ini?')) return;
            try {
                await apiDelete(`/api/budget/${id}`);
                showToast('Budget dihapus');
                load();
            } catch { showToast('Gagal menghapus', 'danger'); }
        }

        load();
    </script>
</body>
</html>
