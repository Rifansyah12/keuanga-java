<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Catatan Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; }

        .left-panel {
            flex: 1;
            background: linear-gradient(145deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 48px;
            position: relative; overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute; width: 400px; height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            top: -100px; left: -100px;
        }
        .left-panel::after {
            content: '';
            position: absolute; width: 300px; height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            bottom: -80px; right: -80px;
        }

        .left-content { position: relative; z-index: 1; text-align: center; }

        .brand-icon {
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white;
            margin: 0 auto 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .left-content h2 { color: white; font-weight: 700; font-size: 1.8rem; margin-bottom: 12px; }
        .left-content p  { color: rgba(255,255,255,0.6); font-size: 0.95rem; line-height: 1.6; max-width: 300px; }

        .feature-list { margin-top: 36px; text-align: left; }
        .feature-item {
            display: flex; align-items: center; gap: 10px;
            color: rgba(255,255,255,0.8);
            font-size: 0.875rem;
            margin-bottom: 12px;
        }
        .feature-item i { color: #a5b4fc; font-size: 1rem; }

        .right-panel {
            width: 460px;
            background: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            padding: 48px;
        }

        .login-box { width: 100%; }

        .login-box h3 { font-size: 1.5rem; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
        .login-box p  { color: #64748b; font-size: 0.875rem; margin-bottom: 32px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 6px; }

        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: #94a3b8; font-size: 1rem;
        }
        .input-wrap input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: #1e293b;
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .input-wrap input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.925rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(99,102,241,0.35);
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.45);
        }

        .alert-box {
            background: #fee2e2; color: #b91c1c;
            border-radius: 10px; padding: 10px 14px;
            font-size: 0.82rem; margin-bottom: 16px;
            display: none;
        }

        .hint { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 0.78rem; }
        .hint span { background: #f1f5f9; padding: 3px 8px; border-radius: 6px; font-family: monospace; color: #475569; }

        @media (max-width: 768px) {
            .left-panel { display: none; }
            .right-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="left-content">
            <div class="brand-icon"><i class="bi bi-wallet2"></i></div>
            <h2>Catatan Keuangan</h2>
            <p>Kelola keuangan pribadi Anda dengan mudah, cepat, dan terorganisir.</p>
            <div class="feature-list">
                <div class="feature-item"><i class="bi bi-check-circle-fill"></i> Catat pemasukan & pengeluaran</div>
                <div class="feature-item"><i class="bi bi-check-circle-fill"></i> Kelola budget bulanan</div>
                <div class="feature-item"><i class="bi bi-check-circle-fill"></i> Dashboard grafik real-time</div>
                <div class="feature-item"><i class="bi bi-check-circle-fill"></i> Kategorisasi transaksi</div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="login-box">
            <h3>Selamat Datang 👋</h3>
            <p>Masuk ke akun Anda untuk melanjutkan</p>

            <div class="alert-box" id="alertBox"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrap">
                        <i class="bi bi-person"></i>
                        <input type="text" id="username" placeholder="Masukkan username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Masuk
                </button>
            </form>

            <div class="hint">
                Default login: <span>admin</span> / <span>admin123</span>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('loggedIn') === 'true') location.href = '/index.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            const btn = e.target.querySelector('button[type=submit]');
            btn.textContent = 'Memuat...';
            btn.disabled = true;
            try {
                const res  = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('loggedIn', 'true');
                    localStorage.setItem('username', data.username);
                    location.href = '/index.html';
                } else {
                    alertBox.textContent = data.message;
                    alertBox.style.display = 'block';
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Masuk';
                    btn.disabled = false;
                }
            } catch {
                alertBox.textContent = 'Server tidak dapat dihubungi. Pastikan aplikasi berjalan.';
                alertBox.style.display = 'block';
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Masuk';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
