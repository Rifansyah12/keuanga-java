<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi - Catatan Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; }
        .navbar { background: #4f46e5 !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <a href="/index.html" class="navbar-brand fw-bold"><i class="bi bi-wallet2 me-2"></i>Catatan Keuangan</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/index.html" class="text-white text-decoration-none small">Dashboard</a>
            <a href="/kategori.html" class="text-white text-decoration-none small">Kategori</a>
            <a href="/budget.html" class="text-white text-decoration-none small">Budget</a>
            <span class="text-white small"><i class="bi bi-person-circle me-1"></i><span id="usernameDisplay"></span></span>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">Keluar</button>
        </div>
    </nav>

    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Data Transaksi</h5>
            <button class="btn btn-primary btn-sm" onclick="openModal()">
                <i class="bi bi-plus-lg me-1"></i> Tambah Transaksi
            </button>
        </div>

        <!-- Filter -->
        <div class="card shadow-sm p-3 mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-auto">
                    <label class="form-label small">Bulan</label>
                    <select id="filterBulan" class="form-select form-select-sm"></select>
                </div>
                <div class="col-auto">
                    <label class="form-label small">Tahun</label>
                    <select id="filterTahun" class="form-select form-select-sm"></select>
                </div>
                <div class="col-auto">
                    <button class="btn btn-secondary btn-sm" onclick="loadTransaksi()">Filter</button>
                    <button class="btn btn-outline-secondary btn-sm ms-1" onclick="loadAll()">Semua</button>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Tanggal</th>
                            <th>Kategori</th>
                            <th>Jenis</th>
                            <th>Keterangan</th>
                            <th class="text-end">Jumlah</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelBody">
                        <tr><td colspan="6" class="text-center text-muted py-4">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="modalTransaksi" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Tambah Transaksi</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="transaksiId">
                    <div class="mb-3">
                        <label class="form-label">Tanggal</label>
                        <input type="date" class="form-control" id="inputTanggal" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Kategori</label>
                        <select class="form-select" id="inputKategori" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Jumlah (Rp)</label>
                        <input type="number" class="form-control" id="inputJumlah" placeholder="50000" min="0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Keterangan</label>
                        <input type="text" class="form-control" id="inputKeterangan" placeholder="Keterangan opsional">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button class="btn btn-primary" onclick="simpan()">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/app.js"></script>
    <script>
        checkLogin();
        const modal = new bootstrap.Modal(document.getElementById('modalTransaksi'));
        let allKategori = [];

        // Isi filter
        const fBulan = document.getElementById('filterBulan');
        const fTahun = document.getElementById('filterTahun');
        const now = new Date();
        BULAN_NAMA.slice(1).forEach((n, i) => {
            const o = new Option(n, i + 1);
            if (i + 1 === now.getMonth() + 1) o.selected = true;
            fBulan.add(o);
        });
        for (let y = now.getFullYear(); y >= now.getFullYear() - 4; y--) {
            const o = new Option(y, y);
            if (y === now.getFullYear()) o.selected = true;
            fTahun.add(o);
        }

        async function init() {
            allKategori = await apiGet('/api/kategori');
            const sel = document.getElementById('inputKategori');
            sel.innerHTML = '<option value="">-- Pilih Kategori --</option>';
            allKategori.forEach(k => sel.add(new Option(`${k.nama} (${k.jenis})`, k.id)));
            await loadAll();
        }

        async function loadAll() {
            render(await apiGet('/api/transaksi'));
        }

        async function loadTransaksi() {
            const b = fBulan.value, t = fTahun.value;
            render(await apiGet(`/api/transaksi/bulan/${b}/tahun/${t}`));
        }

        function render(data) {
            const tbody = document.getElementById('tabelBody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Belum ada transaksi</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(t => `
                <tr>
                    <td>${t.tanggal}</td>
                    <td>${t.kategori.nama}</td>
                    <td>
                        <span class="badge ${t.kategori.jenis === 'PEMASUKAN' ? 'bg-success' : 'bg-danger'}">
                            ${t.kategori.jenis}
                        </span>
                    </td>
                    <td>${t.keterangan || '-'}</td>
                    <td class="text-end fw-semibold ${t.kategori.jenis === 'PEMASUKAN' ? 'text-success' : 'text-danger'}">
                        ${formatRupiah(t.jumlah)}
                    </td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="edit(${JSON.stringify(t).replace(/"/g,'&quot;')})">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="hapus(${t.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function openModal(clear = true) {
            if (clear) {
                document.getElementById('transaksiId').value = '';
                document.getElementById('modalTitle').textContent = 'Tambah Transaksi';
                document.getElementById('inputTanggal').value = new Date().toISOString().split('T')[0];
                document.getElementById('inputKategori').value = '';
                document.getElementById('inputJumlah').value = '';
                document.getElementById('inputKeterangan').value = '';
            }
            modal.show();
        }

        function edit(t) {
            document.getElementById('transaksiId').value = t.id;
            document.getElementById('modalTitle').textContent = 'Edit Transaksi';
            document.getElementById('inputTanggal').value = t.tanggal;
            document.getElementById('inputKategori').value = t.kategori.id;
            document.getElementById('inputJumlah').value = t.jumlah;
            document.getElementById('inputKeterangan').value = t.keterangan || '';
            openModal(false);
        }

        async function simpan() {
            const id = document.getElementById('transaksiId').value;
            const payload = {
                tanggal: document.getElementById('inputTanggal').value,
                jumlah: parseFloat(document.getElementById('inputJumlah').value),
                keterangan: document.getElementById('inputKeterangan').value,
                kategori: { id: parseInt(document.getElementById('inputKategori').value) }
            };
            try {
                if (id) await apiPut(`/api/transaksi/${id}`, payload);
                else await apiPost('/api/transaksi', payload);
                modal.hide();
                showToast('Transaksi berhasil disimpan');
                loadAll();
            } catch { showToast('Gagal menyimpan', 'danger'); }
        }

        async function hapus(id) {
            if (!confirm('Hapus transaksi ini?')) return;
            try {
                await apiDelete(`/api/transaksi/${id}`);
                showToast('Transaksi dihapus');
                loadAll();
            } catch { showToast('Gagal menghapus', 'danger'); }
        }

        init();
    </script>
</body>
</html>
