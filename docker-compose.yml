version: '3.8'

# Untuk pengguna Docker: jalankan perintah berikut sebelum run aplikasi
#   docker-compose up -d
#
# Untuk yang tidak pakai Docker: install MySQL, buat database db_budgeting
#   CREATE DATABASE db_budgeting;
# Setting koneksi di application.properties sama untuk keduanya.

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_budgeting
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_budgeting
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
